type: masonry
path: celine-medication-stock
title: Medication Celine
icon: mdi:pill
badges: []
cards:
- type: vertical-stack
  cards:
  - type: custom:medication-stock-manager-card
    view: stock_buttons
    owner: celine
    show_header: false
  - type: conditional
    conditions:
    - condition: state
      entity: calendar.medication_stock_celine
      state_not: unavailable
    card:
      type: vertical-stack
      cards:
      - type: custom:bubble-card
        card_type: separator
        name: Celine medication schedule and stock dates
        icon: mdi:calendar-month
      - type: custom:bubble-card
        card_type: calendar
        entities:
        - entity: calendar.medication_stock_celine
        days: 3
        limit: 20
        show_end: true
        show_progress: true
        show_started_events: true
        scrolling_effect: false
        styles: |2-
                    /* Let the complete 3-day calendar grow with its contents. */
                    .bubble-container {
                      height: auto !important;
                      min-height: 56px !important;
                      overflow: visible !important;
                    }

                    .card-content {
                      height: auto !important;
                      min-height: 0 !important;
                      overflow: visible !important;
                    }

                    .bubble-calendar-content {
                      height: auto !important;
                      max-height: none !important;
                      overflow: visible !important;
                      mask-image: none !important;
                      -webkit-mask-image: none !important;
                    }

                    .card-content::after {
                      display: none !important;
                    }

                    .bubble-day-wrapper {
                      height: auto !important;
                      min-height: 0 !important;
                      align-items: flex-start !important;
                    }

                    .bubble-day-events {
                      height: auto !important;
                      min-height: 0 !important;
                      overflow: visible !important;
                    }

                    .bubble-event {
                      height: auto !important;
                      min-height: 0 !important;
                      align-items: flex-start !important;
                      line-height: 1.25 !important;
                      padding-top: 5px !important;
                      padding-bottom: 5px !important;
                    }

                    .bubble-event-name-wrapper {
                      width: auto !important;
                      min-width: 0 !important;
                      overflow: visible !important;
                    }

                    .bubble-event-name,
                    .bubble-event-place {
                      display: block !important;
                      max-width: 100% !important;
                      min-width: 0 !important;
                      white-space: normal !important;
                      overflow: visible !important;
                      text-overflow: unset !important;
                      overflow-wrap: anywhere !important;
                      word-break: normal !important;
                      line-height: 1.25 !important;
                    }

                    .bubble-day-chip {
                      margin-top: 0 !important;
                    }
        event_action:
          tap_action:
            action: more-info
          double_tap_action:
            action: none
          hold_action:
            action: none
        sub_button:
          main: []
          bottom: []
