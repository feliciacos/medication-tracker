# Optional Bubble Card owner calendar example.
# Replace replace_with_owner_id in both places with the configured owner ID.
type: vertical-stack
cards:
  - type: custom:medication-stock-manager-card
    view: stock_buttons
    owner: replace_with_owner_id
    show_header: false
  - type: conditional
    conditions:
      - condition: state
        entity: calendar.medication_stock_replace_with_owner_id
        state_not: unavailable
    card:
      type: vertical-stack
      cards:
        - type: custom:bubble-card
          card_type: separator
          name: Medication schedule and stock dates
          icon: mdi:calendar-month
        - type: custom:bubble-card
          card_type: calendar
          entities:
            - entity: calendar.medication_stock_replace_with_owner_id
          days: 3
          limit: 20
          show_end: true
          show_progress: true
          show_started_events: true
          scrolling_effect: false
          event_action:
            tap_action:
              action: more-info
            double_tap_action:
              action: none
            hold_action:
              action: none
